<!-- Contact Form Modal -->
<div id="contactModal" class="modal">
    <div class="modal-content">
        <div class="bg-[#B91C1C] text-white p-6 rounded-t-lg flex-shrink-0">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-bold">Get a Quote</h2>
                <button onclick="closeContactForm()" class="text-white hover:text-gray-300 text-2xl font-bold transition-colors duration-300">
                    &times;
                </button>
            </div>
            <p class="mt-2 text-blue-100">Tell us about your project and we'll provide a detailed quote</p>
        </div>
        
        <div class="modal-body">
            <form class="p-6" onsubmit="handleSubmit(event)">
                <!-- Contact Information -->
                <div class="mb-6">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
                        <i class="fas fa-user mr-2 text-red-700"></i>
                        Contact Information
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-1 gap-4">
                        <div class="form-group">
                            <label for="name">Full Name *</label>
                            <input type="text" id="name" name="name" required placeholder="Enter your name">
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address *</label>
                            <input type="email" id="email" name="email" required placeholder="your.email@example.com">
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number *</label>
                            <input type="tel" id="phone" name="phone" required placeholder="+63 XXX XXX XXXX">
                        </div>
                        <div class="form-group">
                            <label for="company">Company Name</label>
                            <input type="text" id="company" name="company" placeholder="Your company name (optional)">
                        </div>
                    </div>
                </div>

                <!-- Project Details -->
                <div class="mb-6">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
                        <i class="fas fa-building mr-2 text-red-700"></i>
                        Project Details
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="form-group">
                            <label for="projectType">Project Type *</label>
                            <select id="projectType" name="projectType" required>
                                <option value="">Select project type</option>
                                <option value="residential">Residential</option>
                                <option value="commercial">Commercial</option>
                                <option value="industrial">Industrial</option>
                                <option value="infrastructure">Infrastructure</option>
                                <option value="renovation">Renovation</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="timeline">Expected Timeline</label>
                            <select id="timeline" name="timeline">
                                <option value="">Select timeline</option>
                                <option value="asap">As soon as possible</option>
                                <option value="1-3months">1-3 months</option>
                                <option value="3-6months">3-6 months</option>
                                <option value="6-12months">6-12 months</option>
                                <option value="1year+">More than 1 year</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="budget">Estimated Budget</label>
                        <select id="budget" name="budget">
                            <option value="">Select budget range</option>
                            <option value="under-1m">Under ₱1 Million</option>
                            <option value="1m-5m">₱1 Million - ₱5 Million</option>
                            <option value="5m-10m">₱5 Million - ₱10 Million</option>
                            <option value="10m-20m">₱10 Million - ₱20 Million</option>
                            <option value="20m+">Over ₱20 Million</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="location">Project Location</label>
                        <input type="text" id="location" name="location" placeholder="City/Province, Philippines">
                    </div>
                    <div class="form-group">
                        <label for="description">Project Description *</label>
                        <textarea id="description" name="description" required placeholder="Please describe your project in detail..."></textarea>
                    </div>
                </div>

                <!-- Additional Information -->
                <div class="mb-6">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
                        <i class="fas fa-info-circle mr-2 text-red-700"></i>
                        Additional Information
                    </h3>
                    <div class="form-group">
                        <label for="howHeard">How did you hear about us?</label>
                        <select id="howHeard" name="howHeard">
                            <option value="">Select an option</option>
                            <option value="referral">Referral</option>
                            <option value="social-media">Social Media</option>
                            <option value="search-engine">Search Engine</option>
                            <option value="website">Our Website</option>
                            <option value="advertisement">Advertisement</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="message">Additional Message</label>
                        <textarea id="message" name="message" placeholder="Any additional questions or requirements..."></textarea>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="flex justify-end space-x-4 pb-4">
                    <button type="button" onclick="closeContactForm()" class="px-6 py-3 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors duration-300">
                        Cancel
                    </button>
                    <button type="submit" class="px-6 py-3 bg-[#B91C1C] text-white rounded-lg hover:bg-[#991B1B] transition-colors duration-300">
                        Submit Quote Request
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
